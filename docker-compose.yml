services:
  api:
    build: .
    container_name: api
    restart: unless-stopped
    env_file: .env
    expose:
      - "8000"
    volumes:
      - ./logs:/code/logs

  scheduler-leads:
    build: .
    container_name: scheduler-leads
    restart: unless-stopped
    env_file: .env
    command: ["python", "scheduler_leads.py"]
    volumes:
      - ./logs:/code/logs

  scheduler-reminders:
    build: .
    container_name: scheduler-reminders
    restart: unless-stopped
    env_file: .env
    command: ["python", "scheduler_reminders.py"]
    volumes:
      - ./logs:/code/logs

  # Optional (client testing): sends intro SMS to new leads.
  # Enable by running: docker compose up -d scheduler-leads-sms
  scheduler-leads-sms:
    build: .
    container_name: scheduler-leads-sms
    restart: unless-stopped
    env_file: .env
    command: ["python", "scheduler_leads_sms.py"]
    volumes:
      - ./logs:/code/logs

  caddy:
    image: caddy:2-alpine
    container_name: caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api

volumes:
  caddy_data:
  caddy_config:
