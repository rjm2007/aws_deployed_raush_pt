services:
  api:
    build: .
    container_name: api
    restart: unless-stopped
    env_file: .env
    expose:
      - "8000"
    volumes:
      - ./logs:/code/logs

  caddy:
    image: caddy:2-alpine
    container_name: caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api

volumes:
  caddy_data:
  caddy_config:
